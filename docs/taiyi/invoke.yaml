version: 2
description: |
  TaiyiForge 双轨调用说明（对齐 oh-my-codex skills-catalog invoke 块）

# 聊天面 = 推荐 /taiyi:* 斜杠 + 阶段 Skill；引擎面 = Agent 代跑 taiyi-forge.sh

invoke:
  repo_root: 在项目根目录执行
  user_facing:
    pattern: "/taiyi:<verb>"
    rule: 用户只说斜杠；禁止让用户手打 shell / npx / npm run taiyi（CI 脚本除外）
  chat:
    pattern: "/taiyi:<verb>"
    core: [new, continue, apply, status, archive]
    token: [token-status, token-record, token-scan, token-compress]
    codex: "$taiyi-<verb>   # prompts/taiyi-*.md 与斜杠一一对应"
    opencode: "taiyi_* 插件工具（无斜杠菜单，与 slash_catalog 等价）"
  engine_shell:
    role: Agent 内部代跑（映射自用户斜杠）
    unified: "./node_modules/oh-my-taiyiforge/scripts/taiyi-forge.sh <cmd> ..."
    global_bin: "taiyi-forge <cmd> ..."
  phase_skills:
    note: "写工件用 taiyi-change … taiyi-integration；过关必须用 engine"
    orchestrator: "taiyi-orchestrator（--auto 编排清单）"
  iron_triangle:
    superpowers: "聊天内加载 brainstorming / TDD / verification-before-completion"
    gstack: "聊天内 /review、/plan-eng-review 等（非 shell 子命令）"
    openspec: "可选 shell；无 OpenSpec 时 harness 自动跳过"

# 四端入口决策树 — Agent 选路用（人类可读版见 omc-reference.md §入口决策）
entry_decision:
  read_state:
    all: "/taiyi:status（人类；JSON 用 status --json 或 MCP get_status）"
  advance_phase:
    all: "写当前阶段工件 → /taiyi:continue（OpenCode: taiyi_continue）"
  implement_dev_test:
    all: "/taiyi:apply → 实现 → /taiyi:continue"
  pause_session:
    all: "/taiyi:pause（≈ MCP taiyi_state_handoff）"
  abort_change:
    all: "/taiyi:cancel（≈ MCP taiyi_state_cancel）"
  pre_integration_commit:
    all: "/taiyi:commit → /taiyi:continue integration"
  self_check:
    all: "/taiyi:doctor（消费方 npm run taiyi:doctor 仍可用）"
  pr_ci_gate:
    all: "/taiyi:verify（CI 脚本仍用 taiyi ci verify）"
  git_pr_deploy:
    all: "/taiyi:commit → /taiyi:ship → /taiyi:land（gstack Skills；见 delivery-slash.md）"

commands:
  init: "scripts/taiyi-forge.sh init <slug> [--auto] [--profile api|lite]"
  new: "scripts/taiyi-forge.sh new <标题> [--auto|--no-auto]"
  next: "scripts/taiyi-forge.sh next <slug>"
  harness: "scripts/taiyi-forge.sh harness <slug>"
  harness_check: "scripts/taiyi-forge.sh harness-check <slug> <key>"
  complete: "scripts/taiyi-forge.sh complete <slug> <phase>"
  commit_trailers: "scripts/taiyi-forge.sh commit-trailers [slug] [subject]"
  list: "scripts/taiyi-forge.sh list"
