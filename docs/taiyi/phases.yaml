version: 1
name: taiyi-phases
description: 九阶段主流程 — 文档驱动、分层依赖（Skill 均以 taiyi- 为前缀）

phases:
  - id: change
    order: 1
    skill: taiyi-change
    artifact: CHANGE.md
    kind: markdown
  - id: requirement
    order: 2
    skill: taiyi-requirement
    artifact: REQUIREMENT.md
    kind: markdown
    requires: [change]
  - id: design
    order: 3
    skill: taiyi-design
    artifact: DESIGN.md
    kind: markdown
    requires: [requirement]
  - id: ui-design
    order: 4
    skill: taiyi-ui-design
    artifact: UI-DESIGN.md
    kind: markdown
    requires: [design]
  - id: task
    order: 5
    skill: taiyi-task
    artifact: TASK.md
    kind: markdown
    requires: [ui-design]
  - id: dev
    order: 6
    skill: taiyi-dev
    artifact: dev.bundle
    kind: code
    requires: [task]
    notes: TDD 循环 + 六步自检
  - id: test
    order: 7
    skill: taiyi-test
    artifact: TEST.md
    kind: markdown
    requires: [dev]
  - id: review
    order: 8
    skill: taiyi-review
    artifact: REVIEW.md
    kind: markdown
    requires: [test]
  - id: integration
    order: 9
    skill: taiyi-integration
    artifact: CHANGELOG.md
    kind: markdown
    requires: [review]
