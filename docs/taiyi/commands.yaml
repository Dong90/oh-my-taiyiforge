version: 2
description: |
  TaiyiForge 聊天命令 — 对齐 OpenSpec /opsx:<verb> 命名。
  用户只说 /taiyi:new 等；Agent 代跑 taiyi-forge.sh；引擎保留 init/complete 给 CI。

namespace: taiyi
chat_pattern: "/taiyi:<verb> [args]"
codex_pattern: "$taiyi-<verb> [args]   # prompts/taiyi-<verb>.md"

references:
  canonical: docs/taiyi/canonical-commands.md
  openspec_core:
    - "/opsx:new"
    - "/opsx:continue"
    - "/opsx:apply"
    - "/opsx:archive"
  openspec_expanded:
    - "/opsx:explore"
    - "/opsx:verify"
    - "/opsx:sync"

init_vs_new:
  note: |
    **推荐日常只用 `new <标题>`**（聊天 /taiyi:new）。`init <slug>` 保留给 CI、固定 slug、脚本。
    二者都只 seed CHANGE.md，不会自动跑九阶段。
    `new` 默认 **手动** 九阶段；全自动须 `--auto` 或 `TAIYI_AUTO_HARNESS=1`。
    `init` 默认同样非 auto（除非显式 --auto）。

profiles:
  core:
    description: 四动词 + status（九阶段见 workflow.md）
    commands:
      - chat: "/taiyi:new 用户登录"
        codex: "$taiyi-new 用户登录"
        engine: "taiyi-forge.sh new 用户登录"
        meaning: |
          创建变更目录、**默认手动**九阶段、仅铺 CHANGE.md 模板（对标 opsx:new）。
          全自动须 `--auto` 或 `TAIYI_AUTO_HARNESS=1`。
          不自动写工件、不自动跑九阶段；后续须 Skill 写工件 + continue/apply。

      - chat: "/taiyi:continue"
        codex: "$taiyi-continue"
        engine: "taiyi-forge.sh continue [slug] [--approver 名]"
        meaning: |
          尝试 complete 当前阶段；失败则输出 next 指引（对标 opsx:continue）。
          前置：当前阶段工件就绪（非 seed 模板）。
          auto 模式另须：铁三角 harness-check + 辅助 mark-aux。
          change/design/review 须 --approver。
          review 前 medium/high 复杂度须 health-report + mark-aux taiyi-health。
          单变更可省略 slug。

      - chat: "/taiyi:apply"
        codex: "$taiyi-apply"
        engine: "taiyi-forge.sh apply [slug]"
        meaning: |
          仅 dev/test：打印实现 harness 清单（对标 opsx:apply）。
          不写代码、不 complete；实现并写 .dev-complete 后须 /taiyi:continue。
          规划阶段会提示先 /taiyi:continue。

      - chat: "/taiyi:status"
        codex: "$taiyi-status"
        engine: "taiyi-forge.sh status [slug] [--json]"
        meaning: |
          阶段进度（如 design 3/9）、当前 Skill、工件是否就绪、下一步动作。
          人类可读首选；机器/MCP 用 `status --json` 或 MCP taiyi_state_get_status。

      - chat: "/taiyi:archive"
        codex: "$taiyi-archive"
        engine: "taiyi-forge.sh archive [slug]"
        meaning: integration 阶段完成后归档（对标 opsx:archive）

  auxiliary:
    description: 辅助命令（对标 OMX doctor / omc run 配套；非主流程必经）
    commands:
      - chat: "/taiyi:cancel [slug]"
        codex: "$taiyi-cancel"
        engine: "taiyi-forge.sh cancel [slug]"
        meaning: 取消进行中变更（aborted，目录保留）
        when: 走错路、想重新开始

      - chat: "/taiyi:handoff [slug] [note]"
        codex: "$taiyi-handoff"
        engine: "taiyi-forge.sh handoff [slug] [note]"
        meaning: |
          写 HANDOFF.md 快照（对标 OMC notepad / gstack checkpoint）。
          不 complete 任何阶段；下一会话先 /taiyi:status。
        when: 暂停工作、换会话、上下文将满

      - chat: "/taiyi:doctor"
        codex: "$taiyi-doctor"
        engine: "taiyi-forge.sh doctor"
        meaning: 四端 skills + 控制面安装自检 + **工作区流程**（active slug、顺序冲突、代码漂移）
        when: 首次安装、升级后、continue 异常时

      - chat: "/taiyi:audit [slug]"
        codex: "$taiyi-audit"
        engine: "taiyi-forge.sh audit [slug]"
        meaning: |
          流程/交付排查：legacy state、工件漂移、超前阶段工件（artifacts.ahead-of-phase）、
          profile 跳过阶段的遗留文件、CHANGE↔CHANGELOG、integration 与 git 交付未闭环。
          非 doctor（安装）也非 review-check（仅 REVIEW.md）。
        when: 九阶段标完成但代码未入库、status 异常、合并前自检

      - chat: "/taiyi:verify [slug]"
        codex: "$taiyi-verify"
        engine: "taiyi-forge.sh verify [slug] [--require-complete]"
        meaning: |
          PR/CI 工件门禁：当前阶段工件质量、harness 阻塞（无 LLM）。
          与 audit 分工：verify=工件过关 · audit=交付闭环与漂移。
        when: PR 检查、合并前；CI 可用等价命令 `taiyi ci verify`（别名）

      - chat: "/taiyi:health [slug]"
        codex: "$taiyi-health"
        engine: "taiyi-forge.sh health [slug]"
        meaning: |
          CLI 仅输出 Agent 协议（不跑 lint/测试、不写 health-report）。
          Agent 须加载 taiyi-health Skill → 写 health-report.md → mark-aux taiyi-health。
        when: review 前、harness 推荐、medium/high complexity 在 review 过关前必选


      - chat: "/taiyi:list"
        codex: "$taiyi-list"
        engine: "taiyi-forge.sh ls"
        meaning: 列出所有变更及阶段进度
        when: 多变更并行时必须（否则 status/continue 无法推断 slug）


      - chat: "/taiyi:explore"
        codex: "$taiyi-explore"
        engine: "加载 Superpowers brainstorming + taiyi-change（无 shell 子命令）"
        meaning: change 阶段头脑风暴 → 加载 Superpowers brainstorming + taiyi-change
        when: 对标 opsx:explore / OMX clarify，无独立引擎子命令

      - chat: "/taiyi:flow [slug]"
        codex: "$taiyi-flow"
        engine: "读 workflow-manifest.yaml + superpowers-flow.md（无 shell 子命令）"
        meaning: |
          Superpowers 全技能主轴九阶段流程；status/guide 按阶段输出建议/可选 Skill。
          可选外挂：gstack · OpenSpec · web-quality-skills。
        when: onboarding、确认当前阶段该加载哪些 Superpowers


      - chat: "/taiyi:tdd [plan|dev] [slug]"
        codex: "$taiyi-tdd"
        engine: "加载 Superpowers test-driven-development + taiyi-task（plan）或 taiyi-dev（dev）"
        meaning: |
          TDD 纪律入口：task 阶段定切片测试计划（plan）；
          dev 阶段红绿重构实现（dev）。完成后 harness-check superpowers/test-driven-development。
        when: task/dev 阶段；Superpowers TDD 纪律入口

      - chat: "/taiyi:token status [slug]"
        codex: "$taiyi-token-status"
        engine: "taiyi-forge.sh token status [slug]"
        meaning: Token 用量 / 预算 / 阶段上限；超阈值列出压缩策略
        when: 任意阶段；/taiyi:status 已含 Token 行时可省略

      - chat: "/taiyi:token record <slug> <tokens> [--phase change] [--kind agent] [--label \"...\"]"
        codex: "$taiyi-token-record"
        engine: "taiyi-forge.sh token record <slug> <n> [--phase] [--kind] [--label]"
        meaning: Agent 上报本轮 Token → `.token-usage.json`
        when: 每轮对话结束或铁三角 Skill 调用后

      - chat: "/taiyi:token scan <slug>"
        codex: "$taiyi-token-scan"
        engine: "taiyi-forge.sh token scan <slug>"
        meaning: 扫描 CHANGE…CHANGELOG 等工件 Token 并记入 scan
        when: compress 前了解体量

      - chat: "/taiyi:token compress <slug>"
        codex: "$taiyi-token-compress"
        engine: "taiyi-forge.sh token compress <slug>"
        meaning: 引擎零 LLM 压缩 → CONTEXT-COMPACT.md；auto 超阈值还须 mark-aux taiyi-compress
        when: 超 compressThreshold 或 status 建议压缩时

      - chat: "/taiyi:review-loop [slug]"
        codex: "$taiyi-review-loop"
        engine: "taiyi-forge.sh review-loop [slug]"
        meaning: |
          review 机器审查循环：修代码 → 新 REVIEW.md → review-check，直到机器门禁通过。
          不 complete review；通过后须 continue/complete review --approver。
        when: review 阶段或提前准备 REVIEW.md

      - chat: "/taiyi:review-check <slug>"
        codex: "$taiyi-review-check"
        engine: "taiyi-forge.sh review-check <slug>"
        meaning: 单次 review 循环门禁（无 open high；≠ complete review 的 Approve 勾选）
        when: 快速探测 REVIEW.md 是否可结束 review 循环

      - chat: "/taiyi:ralph [slug]"
        codex: "$taiyi-ralph"
        engine: "taiyi-forge.sh ralph [slug]"
        meaning: |
          激活 ralph 模式 + 单步 verify（对标 OMC ralph 死磕）。
          失败时 Cursor stop hook 注入 followup；Agent 代跑 `taiyi-forge.sh step` 修到绿。
          状态 .taiyi/runtime/ralph-mode.json + .ralph-state.json。
        when: dev/test/review 任意阶段需要测试绿

      - chat: "/taiyi:autopilot [slug]"
        codex: "$taiyi-autopilot"
        engine: "taiyi-forge.sh autopilot [slug]"
        meaning: |
          激活 autopilot 模式 + 单步 continue/harness（对标 OMC autopilot）。
          须 init --auto / autoHarness；stop hook 在未完成时继续推进。
        when: 想法 → 可运行代码，一条龙


      - chat: "/taiyi:external-context [slug]"
        codex: "$taiyi-external-context"
        engine: "taiyi-forge.sh external-context [slug]"
        meaning: 外部文档/研究上下文写入 external-context.md
        when: AC 依赖外部 API/法规/第三方 SDK


      - chat: "/taiyi:team [slug]"
        codex: "$taiyi-team"
        engine: "taiyi-forge.sh team [slug]"
        meaning: plan → exec → verify → fix 多 Agent 泳道（原生 team 流水线）
        when: 按阶段并行专 Agent


      - chat: "/taiyi:write [slug]"
        codex: "$taiyi-write"
        engine: "taiyi-forge.sh write [slug]"
        meaning: |
          写当前阶段工件 — 输出 Skill/artifact/continue 指引（九阶段唯一写入口）。
          仍可用 @taiyi-change … @taiyi-integration Skill；引擎 CLI `change` 等保留给脚本。
        when: 任意规划/实现阶段写工件


      - chat: "/taiyi:loop [slug] [xN]"
        codex: "$taiyi-loop"
        engine: "taiyi-forge.sh loop [slug] [xN]"
        meaning: |
          循环 continue（默认每轮最多 20 次），不写工件/代码。
          change/design/review 人工门会硬阻塞，须单独 continue --approver，loop 无法一路跑到 archive。
          其余阶段阻塞后补工件/实现，再调 loop。
        when: 自动推进非人工门阶段；不能替代人工审批

  engine_only:
    description: 无独立聊天斜杠的引擎子命令 — 见 legacy_cli；脚本/CI 仍直接调用 taiyi-forge.sh
    note: 聊天入口以 canonical_commands 为准

  canonical_commands:
    description: 每条职责一个推荐斜杠；重复别名已移除（引擎 CLI legacy 仍可用，见 legacy_cli）
    version: 28
    map:
      handoff: /taiyi:handoff
      commit: /taiyi:commit
      status: /taiyi:status
      continue: /taiyi:continue
      write: /taiyi:write
      release: /taiyi:release

  canonical_v28:
    description: |
      聊天推荐顶栏 — 28 条。引擎能力不删；旧独立斜杠见 legacy_slash 与 legacy_chat_aliases。
      子命令格式：/taiyi:<verb> <sub>（Agent 代跑 taiyi-forge.sh 或加载对应 prompt）。
    groups:
      main_chain:
        count: 6
        commands:
          - slash: /taiyi:new
            engine: "taiyi-forge.sh new <标题>"
          - slash: /taiyi:status
            engine: "taiyi-forge.sh status [slug] [--json --compact]"
          - slash: /taiyi:write
            engine: "taiyi-forge.sh write [slug]"
            note: 九阶段写工件唯一聊天入口；@taiyi-change … @taiyi-integration 仍可直接加载
          - slash: /taiyi:continue
            engine: "taiyi-forge.sh continue [slug] [--approver 名]"
          - slash: /taiyi:apply
            engine: "taiyi-forge.sh apply [slug]"
          - slash: /taiyi:archive
            engine: "taiyi-forge.sh archive [slug]"
      session:
        count: 4
        commands:
          - slash: /taiyi:handoff
            replaces: [pause]
          - slash: /taiyi:resume
          - slash: /taiyi:cancel
          - slash: /taiyi:list
            cli_extras: ["list --archived", "list --all", "prune --aborted"]
      triage:
        count: 3
        commands:
          - slash: /taiyi:doctor
            note: 安装 + 四端 + 工作区；Agent 用 doctor --json --compact
          - slash: /taiyi:audit
            note: 漂移、交付未闭环；非 verify
          - slash: /taiyi:verify
            note: PR/CI 工件门禁；等价 taiyi ci verify
      delivery:
        count: 4
        commands:
          - slash: /taiyi:commit
            replaces: [commit-trailers]
          - slash: /taiyi:ship
            gstack: ship
          - slash: /taiyi:land
            gstack: land-and-deploy
          - slash: /taiyi:release
            gstack: document-release
            replaces: ["/taiyi:gstack release"]
      routers:
        count: 2
        commands:
          - slash: "/taiyi:gstack <skill>"
            note: 任意 gstack Skill（review · qa · plan-eng-review · ship …）
          - slash: "/taiyi:sp <skill>"
            note: 任意 Superpowers Skill（brainstorming · test-driven-development …）
      phase_shortcuts:
        count: 3
        commands:
          - slash: /taiyi:explore
            phase: change
            loads: superpowers/brainstorming + taiyi-change
          - slash: "/taiyi:tdd plan|dev"
            phases: [task, dev]
          - slash: /taiyi:flow
            note: 流程总览；子 topic 见 canonical-commands.md
      umbrellas:
        count: 6
        commands:
          - slash: "/taiyi:token status|record|scan|compress"
            engine_map:
              status: token status
              record: token record
              scan: token scan
              compress: token compress
            phase: 2
            prompt_file: "prompts/taiyi-token.md"
          - slash: "/taiyi:test smoke|e2e|qa|ui|security"
            phase: 2
            prompt_file: "prompts/taiyi-test.md"
          - slash: "/taiyi:review loop|check|health|gstack"
            legacy_map:
              loop: /taiyi:review-loop
              check: /taiyi:review-check
              health: /taiyi:health
              gstack: /taiyi:gstack review
            phase: 2
            prompt_file: "prompts/taiyi-review.md"
          - slash: "/taiyi:diagram pipeline|c4|arch|render|flow"
            phase: 2
            prompt_file: "prompts/taiyi-diagram.md"
          - slash: "/taiyi:mode ralph|autopilot|daemon|team|ultrawork|agent|step|stop|list"
            legacy_map:
              ralph: /taiyi:ralph
              autopilot: /taiyi:autopilot
              team: /taiyi:team
              list: /taiyi:mode list
            phase: 2
            prompt_file: "prompts/taiyi-mode.md"
          - slash: "/taiyi:workflow plan|ralplan|loop|ccg|sciomc|deepinit|remember|ultraqa|…"
            legacy_map:
              loop: /taiyi:loop
              external-context: /taiyi:external-context
              deep-interview: /taiyi:deep-interview
              visual-verdict: /taiyi:visual-verdict
              ai-slop-cleaner: /taiyi:ai-slop-cleaner
              ecomode: /taiyi:ecomode
            phase: 2
            prompt_file: "prompts/taiyi-workflow.md"

  slash_catalog:
    description: |
      v28 推荐顶栏（canonical_v28）+ legacy 兼容斜杠（prompt/引擎仍可用，不再新增同类入口）。
    recommended_v28:
      main_chain:
        - /taiyi:new
        - /taiyi:status
        - /taiyi:write
        - /taiyi:continue
        - /taiyi:apply
        - /taiyi:archive
      session:
        - /taiyi:handoff
        - /taiyi:resume
        - /taiyi:cancel
        - /taiyi:list
      triage:
        - /taiyi:doctor
        - /taiyi:audit
        - /taiyi:verify
      delivery:
        - /taiyi:commit
        - /taiyi:ship
        - /taiyi:land
        - /taiyi:release
      routers:
        - /taiyi:gstack <skill>
        - /taiyi:sp <skill>
      phase_shortcuts:
        - /taiyi:explore
        - /taiyi:tdd plan|dev
        - /taiyi:flow
      umbrellas:
        - /taiyi:token status|record|scan|compress
        - /taiyi:test smoke|e2e|qa|ui|security
        - /taiyi:review loop|check|health|gstack
        - /taiyi:diagram pipeline|c4|arch|render|flow
        - /taiyi:mode ralph|autopilot|daemon|team|ultrawork|agent|step|stop|list
        - /taiyi:workflow plan|ralplan|loop|ccg|sciomc|deepinit|remember|ultraqa|…
    legacy_slash:
      description: 旧顶栏 — 仍绑定 prompts/taiyi-*.md；请优先用 v28 伞形命令
      phase_write:
        - /taiyi:write
      auxiliary:
        - /taiyi:health
        - /taiyi:loop
        - /taiyi:review-loop
        - /taiyi:review-check
        - /taiyi:ralph
        - /taiyi:autopilot
        - /taiyi:external-context
        - /taiyi:deep-interview
        - /taiyi:visual-verdict
        - /taiyi:ai-slop-cleaner
        - /taiyi:ecomode
        - /taiyi:team
    opencode_tools:
      note: OpenCode 无斜杠菜单，用 taiyi_* 插件工具；与 slash 一一对应
      mode_tools:
        - taiyi_step
        - taiyi_stop_mode
        - taiyi_modes
        - taiyi_keyword
        - taiyi_remember
        - taiyi_workflow
        - taiyi_doctor
        - taiyi_audit
      mcp_tools:
        - taiyi_state_get_status
        - taiyi_state_list_active
        - taiyi_state_read
        - taiyi_state_handoff
        - taiyi_state_cancel
        - taiyi_doctor
        - taiyi_audit
        - taiyi_mode_step
        - taiyi_mode_stop
        - taiyi_mode_list
        - taiyi_remember
        - taiyi_keyword
        - taiyi_workflow
        - taiyi_lsp_diagnostics
        - taiyi_lsp_goto_definition
        - taiyi_lsp_find_references
      opencode_parity:
        - taiyi_step ↔ taiyi_mode_step
        - taiyi_stop_mode ↔ taiyi_mode_stop
        - taiyi_modes ↔ taiyi_mode_list
        - taiyi_keyword
        - taiyi_remember
        - taiyi_workflow

  delivery_gstack:
    description: git / PR / 部署 — 加载 gstack Skill（见 docs/taiyi/delivery-slash.md）
    chain: [commit, verify, gstack-review, ship, land, release, continue-integration, archive]
    commands:
      - chat: "/taiyi:commit [slug] [subject]"
        gstack: "(Taiyi commit-trailers + git commit)"
      - chat: "/taiyi:ship"
        gstack: ship
      - chat: "/taiyi:land"
        gstack: land-and-deploy
      - chat: "/taiyi:gstack review"
        gstack: review
      - chat: "/taiyi:gstack qa"
        gstack: qa
      - chat: "/taiyi:release"
        gstack: document-release
      - chat: "/taiyi:gstack <skill>"
        gstack: "任意 gstack Skill（design-shotgun · autoplan · canary · gstack-upgrade …）"
      - chat: "/taiyi:sp <skill>"
        superpowers: "任意 Superpowers Skill（writing-skills · brainstorming …）"
      - chat: "/taiyi:resume [slug]"
        engine: "read HANDOFF.md + status"

  repeat_suffix:
    description: 多数引擎命令可后缀 xN；complete/mark-aux/harness-check 等须显式参数，不支持 xN
    examples:
      - "/taiyi:continue x3"
      - "/taiyi:apply x2"
      - "/taiyi:check x2"
      - "/taiyi:loop x10"
    engine: "taiyi-forge.sh <cmd> [slug] xN 或 --times N"

  expanded:
    commands:
      - chat: "/taiyi:explore"
        engine: "提示加载 taiyi-change + Superpowers brainstorming"
      - chat: "/taiyi:doctor"
        engine: "taiyi-forge.sh doctor"

legacy_aliases:
  shell: [done, next, n, go, ls, check, sync, pause, guide, commit-trailers, change, requirement, design, ui-design, task, dev, test, review, integration]
  chat: ["/tf new", "/tf next", "/tf done"]
  note: "引擎 CLI 仍可用；聊天以 canonical_commands 为准"

legacy_cli:
  description: 无聊天斜杠的引擎子命令（脚本/CI/MCP）
  replaces:
    pause: handoff
    commit-trailers: /taiyi:commit
    state: "status --json 或 MCP taiyi_state_get_status"
    state-read: "MCP taiyi_state_read 或读 state.json"
    next: /taiyi:status 或 /taiyi:continue
    done: /taiyi:continue
    guide: "taiyi-forge.sh guide --json"
    phase_writes: /taiyi:write

phase_skills:
  description: 九阶段写工件 — 聊天唯一入口 /taiyi:write；@taiyi-* Skill 仍可直接加载
  slash: /taiyi:write
  engine: "taiyi-forge.sh write [slug] — 输出当前阶段 Skill/工件/continue 指引"
  skills: taiyi-change … taiyi-integration

profile_notes:
  invalid: "init/new/walkthrough 非法 --profile（非 full|api|ui|lite）须 exit 1，勿静默回落 full"
