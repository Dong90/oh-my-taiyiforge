  delivery_gstack:
    description: git / PR / 部署 — 加载 gstack Skill（见 docs/taiyi/delivery-slash.md）
    chain: [commit, verify, gstack-review, ship, land, release, continue-integration, archive]
    commands:
      - chat: "/taiyi:commit [slug] [subject]"
        gstack: "(Taiyi commit-trailers + git commit)"
      - chat: "/taiyi:ship"
        gstack: ship
      - chat: "/taiyi:land"
        gstack: land-and-deploy
      - chat: "/taiyi:gstack review"
        gstack: review
      - chat: "/taiyi:gstack qa"
        gstack: qa
      - chat: "/taiyi:release"
        gstack: document-release
        alias: "/taiyi:gstack release"
      - chat: "/taiyi:gstack <skill>"
        gstack: "任意 gstack Skill（design-shotgun · autoplan · canary · gstack-upgrade …）"
      - chat: "/taiyi:sp <skill>"
        superpowers: "任意 Superpowers Skill（writing-skills · brainstorming …）"
      - chat: "/taiyi:security [slug]"
        engine: "semgrep + trivy（optional gstack cso）"
      - chat: "/taiyi:e2e [slug]"
        engine: "npx playwright test + verification-before-completion"
      - chat: "/taiyi:resume [slug]"
        engine: "read HANDOFF.md + status"
      - chat: "/taiyi:help [topic]"
        engine: "slash_catalog + scenario playbooks"

  repeat_suffix:
    description: 多数引擎命令可后缀 xN；complete/mark-aux/harness-check 等须显式参数，不支持 xN
    examples:
      - "/taiyi:continue x3"
      - "/taiyi:apply x2"
      - "/taiyi:check x2"
      - "/taiyi:loop x10"
    engine: "taiyi-forge.sh <cmd> [slug] xN 或 --times N"

  expanded:
    commands:
      - chat: "/taiyi:explore"
        engine: "提示加载 taiyi-change + Superpowers brainstorming"
      - chat: "/taiyi:sync"
        engine: "taiyi-forge.sh sync [slug]"
      - chat: "/taiyi:doctor"
        engine: "taiyi-forge.sh doctor"

legacy_aliases:
  shell: [done, next, n, go, ls, check, sync]
  chat: ["/tf new", "/tf next", "/tf done"]
  note: "仍可用，文档以 /taiyi:<verb> 为准"

phase_skills:
  description: 九阶段写工件 — 现已全部有 /taiyi:* 斜杠（等价 @taiyi-* Skill）
  slashes:
    - /taiyi:write
    - /taiyi:change
    - /taiyi:requirement
    - /taiyi:design
    - /taiyi:ui-design
    - /taiyi:task
    - /taiyi:dev
    - /taiyi:test
    - /taiyi:review
    - /taiyi:integration
  engine: "taiyi-forge.sh write | change | … — 输出 Skill/工件/continue 指引"
  skills: taiyi-change … taiyi-integration（@skill 仍可用）

profile_notes:
  ui: "与 full 相同九阶段，仅命名强调 UI 项目"
  lite: "五阶段，跳过 design/ui-design/task/review，无 REVIEW.md 与 review-loop 路径"
  api: "跳过 ui-design"

auxiliary_notes:
  taiyi_evolve: "high 复杂度会推荐；home 阶段为 test，产出 architecture-sync.md；review 仅强制 taiyi-health"
