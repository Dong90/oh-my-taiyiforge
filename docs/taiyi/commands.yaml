version: 2
description: |
  TaiyiForge 聊天命令 — 对齐 OpenSpec /opsx:<verb> 命名。
  用户只说 /taiyi:new 等；Agent 代跑 taiyi-forge.sh；引擎保留 init/complete 给 CI。

namespace: taiyi
chat_pattern: "/taiyi:<verb> [args]"
codex_pattern: "$taiyi-<verb> [args]   # prompts/taiyi-<verb>.md"

references:
  openspec_core:
    - "/opsx:new"
    - "/opsx:continue"
    - "/opsx:apply"
    - "/opsx:archive"
  openspec_expanded:
    - "/opsx:explore"
    - "/opsx:verify"
    - "/opsx:sync"

init_vs_new:
  note: |
    **推荐日常只用 `new <标题>`**（聊天 /taiyi:new）。`init <slug>` 保留给 CI、固定 slug、脚本。
    二者都只 seed CHANGE.md，不会自动跑九阶段。
    `new` 默认 **手动** 九阶段；全自动须 `--auto` 或 `TAIYI_AUTO_HARNESS=1`。
    `init` 默认同样非 auto（除非显式 --auto）。

profiles:
  core:
    description: 四动词 + status（九阶段见 workflow.md）
    commands:
      - chat: "/taiyi:new 用户登录"
        codex: "$taiyi-new 用户登录"
        engine: "taiyi-forge.sh new 用户登录"
        meaning: |
          创建变更目录、**默认手动**九阶段、仅铺 CHANGE.md 模板（对标 opsx:new）。
          全自动须 `--auto` 或 `TAIYI_AUTO_HARNESS=1`。
          不自动写工件、不自动跑九阶段；后续须 Skill 写工件 + continue/apply。

      - chat: "/taiyi:continue"
        codex: "$taiyi-continue"
        engine: "taiyi-forge.sh continue [slug] [--approver 名]"
        meaning: |
          尝试 complete 当前阶段；失败则输出 next 指引（对标 opsx:continue）。
          前置：当前阶段工件就绪（非 seed 模板）。
          auto 模式另须：铁三角 harness-check + 辅助 mark-aux。
          change/design/review 须 --approver。
          review 前 medium/high 复杂度须 health-report + mark-aux taiyi-health。
          单变更可省略 slug。

      - chat: "/taiyi:apply"
        codex: "$taiyi-apply"
        engine: "taiyi-forge.sh apply [slug]"
        meaning: |
          仅 dev/test：打印实现 harness 清单（对标 opsx:apply）。
          不写代码、不 complete；实现并写 .dev-complete 后须 /taiyi:continue。
          规划阶段会提示先 /taiyi:continue。

      - chat: "/taiyi:status"
        codex: "$taiyi-status"
        engine: "taiyi-forge.sh status [slug]"
        meaning: |
          阶段进度（如 design 3/9）、当前 Skill、工件是否就绪、下一步动作。
          人类可读首选；guide 命令默认 JSON，日常用 status/next。

      - chat: "/taiyi:archive"
        codex: "$taiyi-archive"
        engine: "taiyi-forge.sh archive [slug]"
        meaning: integration 阶段完成后归档（对标 opsx:archive）

  auxiliary:
    description: 辅助命令（对标 OMX doctor / omc run 配套；非主流程必经）
    commands:
      - chat: "/taiyi:cancel [slug]"
        codex: "$taiyi-cancel"
        engine: "taiyi-forge.sh cancel [slug]"
        meaning: 取消进行中变更（aborted，目录保留）
        when: 走错路、想重新开始

      - chat: "/taiyi:handoff [slug] [note]"
        codex: "$taiyi-handoff"
        engine: "taiyi-forge.sh handoff [slug] [note]"
        meaning: |
          写 HANDOFF.md 快照（对标 OMC notepad / gstack checkpoint）。
          不 complete 任何阶段；下一会话先 /taiyi:status。
        when: 暂停工作、换会话、上下文将满

      - chat: "/taiyi:doctor"
        codex: "$taiyi-doctor"
        engine: "taiyi-forge.sh doctor"
        meaning: 四端 skills + 控制面安装自检 + **工作区流程**（active slug、顺序冲突、代码漂移）
        when: 首次安装、升级后、continue 异常时

      - chat: "/taiyi:audit [slug]"
        codex: "$taiyi-audit"
        engine: "taiyi-forge.sh audit [slug]"
        meaning: |
          流程/交付排查：legacy state、工件漂移、超前阶段工件（artifacts.ahead-of-phase）、
          profile 跳过阶段的遗留文件、CHANGE↔CHANGELOG、integration 与 git 交付未闭环。
          非 doctor（安装）也非 review-check（仅 REVIEW.md）。
        when: 九阶段标完成但代码未入库、status 异常、合并前自检

      - chat: "/taiyi:verify [slug]"
        codex: "$taiyi-verify"
        engine: "taiyi-forge.sh verify [slug] [--require-complete]"
        meaning: |
          PR/CI 工件门禁：当前阶段工件质量、harness 阻塞（无 LLM）。
          与 audit 分工：verify=工件过关 · audit=交付闭环与漂移。
        when: PR 检查、合并前；CI 可用等价命令 `taiyi ci verify`（别名）

      - chat: "/taiyi:health [slug]"
        codex: "$taiyi-health"
        engine: "taiyi-forge.sh health [slug]"
        meaning: |
          CLI 仅输出 Agent 协议（不跑 lint/测试、不写 health-report）。
          Agent 须加载 taiyi-health Skill → 写 health-report.md → mark-aux taiyi-health。
        when: review 前、harness 推荐、medium/high complexity 在 review 过关前必选

      - chat: "/taiyi:diagram-pipeline [slug] [--repo] [--scope path] [--skip-render] [--review]"
        codex: "$taiyi-diagram-pipeline"
        engine: "（聊天 Skill）加载 taiyi-diagram-pipeline"
        meaning: |
          架构图三步流水线编排：① diagram-c4（C4 真源）→ ② diagram-arch（工程补充）→ ③ diagram-render（SVG）。
          一条真源顺序执行，避免三套不一致的图。详见 `docs/diagrams/pipeline.md`。
        when: design 阶段、仓库文档维护、从代码到可评审架构图

      - chat: "/taiyi:diagram-c4 [slug] [--repo] [--scope path]"
        codex: "$taiyi-diagram-c4"
        engine: "（聊天 Skill）加载 taiyi-diagram-c4"
        meaning: |
          流水线第 1 步：扫代码写 C4 真源（Observed/Inferred + Mermaid）。
          产出 `diagrams/c4/` 或 `docs/c4/`；可选增强 c4-codebase-architecture skill。
        when: 陌生代码库、大重构、pipeline Step 1

      - chat: "/taiyi:diagram-arch [slug] [topic]"
        codex: "$taiyi-diagram-arch"
        engine: "（聊天 Skill）加载 taiyi-diagram-arch"
        meaning: |
          流水线第 2 步：以 `diagrams/c4/containers.md` 为真源同步 `diagrams/architecture.md`（勿重划模块）。
          产品海报仍用 `scripts/generate-architecture-svg.py`。
        when: design 阶段、pipeline Step 2、有模块边界/部署视图

      - chat: "/taiyi:diagram-render [slug] [--repo] [--review]"
        codex: "$taiyi-diagram-render"
        engine: "（聊天 Skill）加载 taiyi-diagram-render"
        meaning: |
          流水线第 3 步：Mermaid → SVG（`render-mermaid.mjs` 或 diagramming-architecture 视觉审查）。
          产出 `diagrams/c4/png/*.svg`；可选 `diagrams/png/`（architecture）；禁止重新扫代码。
        when: 要评审用预览图、pipeline Step 3

      - chat: "/taiyi:diagram-flow [slug] [flow-name]"
        codex: "$taiyi-diagram-flow"
        engine: "（聊天 Skill）加载 taiyi-diagram-flow"
        meaning: |
          业务流程图 / 状态机 / 九阶段 flowchart；AC 追溯表；TASK 切片对齐。
          产出 `diagrams/flows.md` 或 `diagrams/flow-<name>.md`；mark-aux taiyi-diagram-flow。
        when: 多分支 AC、task 切片前、harness/门禁可视化

      - chat: "/taiyi:list"
        codex: "$taiyi-list"
        engine: "taiyi-forge.sh ls"
        meaning: 列出所有变更及阶段进度
        when: 多变更并行时必须（否则 status/continue 无法推断 slug）

      - chat: "/taiyi:check"
        codex: "$taiyi-check"
        engine: "taiyi-forge.sh check [slug]"
        meaning: auto 模式 harness 清单（铁三角 → 辅助须 mark-aux → 主 Skill）
        when: init --auto 或 new 后每阶段过关前

      - chat: "/taiyi:sync"
        codex: "$taiyi-sync"
        engine: "taiyi-forge.sh sync [slug]   # 引擎子命令为 sync（非 sync-openspec）；CLI 也接受 sync-openspec"
        meaning: Taiyi 工件 → OpenSpec（对标 opsx:sync）。聊天动词无连字符，引擎用 sync 别名
        when: 项目已装 OpenSpec，integration 前后

      - chat: "/taiyi:run"
        codex: "$taiyi-run"
        engine: "taiyi-forge.sh run [--slug name]"
        meaning: |
          首次体验：doctor + init demo + 打印下一步（≈ npx taiyi walkthrough）。
          不跑九阶段。完整 E2E 见 examples/minimal-project → npm run walkthrough-e2e。
        when: onboarding、CI 冒烟，非日常主流程

      - chat: "/taiyi:explore"
        codex: "$taiyi-explore"
        engine: "加载 Superpowers brainstorming + taiyi-change（无 shell 子命令）"
        meaning: change 阶段头脑风暴 → 加载 Superpowers brainstorming + taiyi-change
        when: 对标 opsx:explore / OMX clarify，无独立引擎子命令

      - chat: "/taiyi:flow [slug]"
        codex: "$taiyi-flow"
        engine: "读 workflow-manifest.yaml + superpowers-flow.md（无 shell 子命令）"
        meaning: |
          Superpowers 全技能主轴九阶段流程；status/guide 按阶段输出建议/可选 Skill。
          可选外挂：gstack · OpenSpec · web-quality-skills。
        when: onboarding、确认当前阶段该加载哪些 Superpowers

      - chat: "/taiyi:full-flow [slug]"
        codex: "$taiyi-full-flow"
        engine: "读 workflow-manifest.yaml + full-oss-flow.md + harness <slug>（无 shell 子命令）"
        meaning: |
          完整开源流程：Superpowers + gstack + OpenSpec + web-quality + Playwright +
          Semgrep + Trivy + Changesets + taiyi 辅助 Skill，按阶段全部串联执行。
        when: 要跑通全部开源 Skill/CLI 的端到端流程

      - chat: "/taiyi:tdd [plan|dev] [slug]"
        codex: "$taiyi-tdd"
        engine: "加载 Superpowers test-driven-development + taiyi-task（plan）或 taiyi-dev（dev）"
        meaning: |
          TDD 纪律入口：task 阶段定切片测试计划（plan）；
          dev 阶段红绿重构实现（dev）。完成后 harness-check superpowers/test-driven-development。
        when: task/dev 阶段；Superpowers TDD 纪律入口

      - chat: "/taiyi:token status [slug]"
        codex: "$taiyi-token-status"
        engine: "taiyi-forge.sh token status [slug]"
        meaning: Token 用量 / 预算 / 阶段上限；超阈值列出压缩策略
        when: 任意阶段；/taiyi:status 已含 Token 行时可省略

      - chat: "/taiyi:token record <slug> <tokens> [--phase change] [--kind agent] [--label \"...\"]"
        codex: "$taiyi-token-record"
        engine: "taiyi-forge.sh token record <slug> <n> [--phase] [--kind] [--label]"
        meaning: Agent 上报本轮 Token → `.token-usage.json`
        when: 每轮对话结束或铁三角 Skill 调用后

      - chat: "/taiyi:token scan <slug>"
        codex: "$taiyi-token-scan"
        engine: "taiyi-forge.sh token scan <slug>"
        meaning: 扫描 CHANGE…CHANGELOG 等工件 Token 并记入 scan
        when: compress 前了解体量

      - chat: "/taiyi:token compress <slug>"
        codex: "$taiyi-token-compress"
        engine: "taiyi-forge.sh token compress <slug>"
        meaning: 引擎零 LLM 压缩 → CONTEXT-COMPACT.md；auto 超阈值还须 mark-aux taiyi-compress
        when: 超 compressThreshold 或 status 建议压缩时

      - chat: "/taiyi:review-loop [slug]"
        codex: "$taiyi-review-loop"
        engine: "taiyi-forge.sh review-loop [slug]"
        meaning: |
          review 机器审查循环：修代码 → 新 REVIEW.md → review-check，直到机器门禁通过。
          不 complete review；通过后须 continue/complete review --approver。
        when: review 阶段或提前准备 REVIEW.md

      - chat: "/taiyi:review-check <slug>"
        codex: "$taiyi-review-check"
        engine: "taiyi-forge.sh review-check <slug>"
        meaning: 单次 review 循环门禁（无 open high；≠ complete review 的 Approve 勾选）
        when: 快速探测 REVIEW.md 是否可结束 review 循环

      - chat: "/taiyi:ralph [slug]"
        codex: "$taiyi-ralph"
        engine: "taiyi-forge.sh ralph [slug]"
        meaning: |
          激活 ralph 模式 + 单步 verify（对标 OMC ralph 死磕）。
          失败时 Cursor stop hook 注入 followup；Agent 代跑 `taiyi-forge.sh step` 修到绿。
          状态 .taiyi/runtime/ralph-mode.json + .ralph-state.json。
        when: dev/test/review 任意阶段需要测试绿

      - chat: "/taiyi:autopilot [slug]"
        codex: "$taiyi-autopilot"
        engine: "taiyi-forge.sh autopilot [slug]"
        meaning: |
          激活 autopilot 模式 + 单步 continue/harness（对标 OMC autopilot）。
          须 init --auto / autoHarness；stop hook 在未完成时继续推进。
        when: 想法 → 可运行代码，一条龙

      - chat: "/taiyi:step [slug] [--mode ralph|autopilot|…]"
        codex: "$taiyi-step"
        engine: "taiyi-forge.sh step [slug] [--mode …]"
        meaning: |
          OMC 式单步驱动：一次 ralph verify / autopilot continue / harness 阻塞处理。
          Agent 每轮只跑一步；配合 stop hook 形成循环。
        when: ralph/autopilot/ultraqa 活跃时（keyword hook 也会提醒）

      - chat: "/taiyi:stop-mode [--force] [slug]"
        codex: "$taiyi-stop-mode"
        engine: "taiyi-forge.sh stop-mode [--force] [slug]"
        meaning: 取消活跃运行时模式（ralph/autopilot/ultrawork/team 等）。关键词 stopomc 等价。
        when: 验证已绿或需人工接管

      - chat: "/taiyi:modes"
        codex: "$taiyi-modes"
        engine: "taiyi-forge.sh modes"
        meaning: 列出 .taiyi/runtime/*-mode.json 活跃模式
        when: 不确定当前是否在 ralph/autopilot 循环中

      - chat: "/taiyi:remember [note]"
        codex: "$taiyi-remember"
        engine: "taiyi-forge.sh remember [note]"
        meaning: 读写 .taiyi/project-memory.json（对标 OMC project memory）
        when: 跨会话记住模式/约束

      - chat: "/taiyi:plan [slug]"
        codex: "$taiyi-plan"
        engine: "taiyi-forge.sh plan [slug]"
        meaning: 规划 workflow skill + step（对标 OMC plan mode）
        when: 大改前先定执行计划

      - chat: "/taiyi:ralplan [slug]"
        codex: "$taiyi-ralplan"
        engine: "taiyi-forge.sh ralplan [slug]"
        meaning: ralph 前须完成的 ralplan 工件门禁（ralplan-first）
        when: dev/test 跑 ralph 前

      - chat: "/taiyi:ultraqa [slug]"
        codex: "$taiyi-ultraqa"
        engine: "taiyi-forge.sh ultraqa [slug]"
        meaning: QA 强化循环（gstack qa + step）
        when: test 阶段深度 QA

      - chat: "/taiyi:ccg [slug]"
        codex: "$taiyi-ccg"
        engine: "taiyi-forge.sh ccg [slug]"
        meaning: 跨 AI 收敛评审 workflow（对标 OMC ccg）
        when: design/plan 需多模型对齐

      - chat: "/taiyi:sciomc [slug]"
        codex: "$taiyi-sciomc"
        engine: "taiyi-forge.sh sciomc [slug]"
        meaning: 科学方法调试 workflow（对标 OMC sciomc）
        when: 复杂 bug 需假设—验证循环

      - chat: "/taiyi:deepinit [slug]"
        codex: "$taiyi-deepinit"
        engine: "taiyi-forge.sh deepinit [slug]"
        meaning: monorepo AGENTS.md 层级初始化
        when: 大仓库 onboarding

      - chat: "/taiyi:external-context [slug]"
        codex: "$taiyi-external-context"
        engine: "taiyi-forge.sh external-context [slug]"
        meaning: 外部文档/研究上下文写入 external-context.md
        when: AC 依赖外部 API/法规/第三方 SDK

      - chat: "/taiyi:preflight"
        codex: "$taiyi-preflight"
        engine: "codex-keyword-preflight.mjs + codex-mode-reminder.mjs"
        meaning: Codex 无 hook 时的关键词检测 + step 提醒
        when: Codex 每轮开始/结束前自觉执行

      - chat: "/taiyi:team [slug]"
        codex: "$taiyi-team"
        engine: "taiyi-forge.sh team [slug]"
        meaning: plan → exec → verify → fix 多 Agent 泳道（原生 team 流水线）
        when: 按阶段并行专 Agent

      - chat: "/taiyi:ultrawork [slug]"
        codex: "$taiyi-ultrawork"
        engine: "taiyi-forge.sh ultrawork [slug]"
        meaning: task/dev 按 TASK.md 切片高吞吐并行（subagent）
        when: 多切片实现、每切片独立 PR

      - chat: "/taiyi:agent <role|list> [slug]"
        codex: "$taiyi-agent"
        engine: "taiyi-forge.sh agent <role|list> [slug]"
        meaning: 29 专 Agent 角色加载协议（见 agent-roles.yaml）
        when: 需要 executor/debugger/verifier 等单一角色

      - chat: "/taiyi:write [slug]"
        codex: "$taiyi-write"
        engine: "taiyi-forge.sh write [slug]"
        meaning: 写当前阶段工件 — 输出 Skill/artifact/continue 指引
        when: 不确定用哪个阶段斜杠时

      - chat: "/taiyi:change [slug]"
        codex: "$taiyi-change"
        engine: "taiyi-forge.sh change [slug]"
        meaning: 写 CHANGE.md（@taiyi-change）
        when: change 阶段

      - chat: "/taiyi:requirement [slug]"
        engine: "taiyi-forge.sh requirement [slug]"
        meaning: 写 REQUIREMENT.md

      - chat: "/taiyi:design [slug]"
        engine: "taiyi-forge.sh design [slug]"
        meaning: 写 DESIGN.md（人工门）

      - chat: "/taiyi:ui-design [slug]"
        engine: "taiyi-forge.sh ui-design [slug]"
        meaning: 写 UI-DESIGN.md

      - chat: "/taiyi:task [slug]"
        engine: "taiyi-forge.sh task [slug]"
        meaning: 写 TASK.md

      - chat: "/taiyi:dev [slug]"
        engine: "taiyi-forge.sh dev [slug]"
        meaning: TDD 实现 + .dev-complete

      - chat: "/taiyi:test [slug]"
        engine: "taiyi-forge.sh test [slug]"
        meaning: 写 TEST.md 测试证据

      - chat: "/taiyi:review [slug]"
        engine: "taiyi-forge.sh review [slug]"
        meaning: 写 REVIEW.md（人工门）

      - chat: "/taiyi:integration [slug]"
        engine: "taiyi-forge.sh integration [slug]"
        meaning: 写 CHANGELOG.md + 交付门

      - chat: "/taiyi:feature [标题或slug]"
        engine: "taiyi-forge.sh feature …"
        meaning: 新功能 full 九阶段场景剧本

      - chat: "/taiyi:bug [描述或slug]"
        engine: "taiyi-forge.sh bug …"
        meaning: 修 bug lite 五阶段场景剧本

      - chat: "/taiyi:ui-test [slug]"
        engine: "提示 /taiyi:gstack qa + /taiyi:e2e"
        meaning: test 阶段 UI QA 捷径

      - chat: "/taiyi:loop [slug] [xN]"
        codex: "$taiyi-loop"
        engine: "taiyi-forge.sh loop [slug] [xN]"
        meaning: |
          循环 continue（默认每轮最多 20 次），不写工件/代码。
          change/design/review 人工门会硬阻塞，须单独 continue --approver，loop 无法一路跑到 archive。
          其余阶段阻塞后补工件/实现，再调 loop。
        when: 自动推进非人工门阶段；不能替代人工审批

  engine_only:
    description: 已废弃 — 全部引擎动词均有 /taiyi:* 斜杠（见 slash_catalog）
    note: Agent 代跑 taiyi-forge.sh；用户只说斜杠

  slash_catalog:
    description: 100% 斜杠面 — 每个 taiyi CLI 子命令均有聊天别名（prompts/taiyi-*.md）
    core:
      - /taiyi:new
      - /taiyi:status
      - /taiyi:continue
      - /taiyi:apply
      - /taiyi:archive
    auxiliary:
      - /taiyi:doctor
      - /taiyi:audit
      - /taiyi:verify
      - /taiyi:health
      - /taiyi:diagram-pipeline
      - /taiyi:diagram-c4
      - /taiyi:diagram-render
      - /taiyi:list
      - /taiyi:check
      - /taiyi:sync
      - /taiyi:run
      - /taiyi:handoff
      - /taiyi:pause
      - /taiyi:cancel
      - /taiyi:loop
      - /taiyi:review-loop
      - /taiyi:review-check
      - /taiyi:ralph
      - /taiyi:autopilot
