version: 1
description: TaiyiForge 阶段 × 外部工具/Skill 推荐（OpenSpec / Superpowers / gstack）

hooks:
  change:
    - tool: superpowers
      skill: brainstorming
      when: 立项前澄清范围与风险
  requirement:
    - tool: openspec
      command: openspec change show <slug>
      optional: true
      when: 项目已 init OpenSpec 时对照 proposal/specs
  design:
    - tool: gstack
      skill: plan-eng-review
      when: 架构与边界需要工程评审
  ui-design:
    - tool: gstack
      skill: plan-design-review
      optional: true
      when: UI/UX 设计计划评审（有界面时建议；纯 API 可跳过）
  dev:
    - tool: superpowers
      skill: test-driven-development
      when: TDD 纪律与 taiyi-dev 对齐
  test:
    - tool: superpowers
      skill: verification-before-completion
      when: 声明测试完成前要有运行证据
    - tool: gstack
      skill: qa
      optional: true
      when: test 阶段站点/流程 QA（有 UI 或 web 面时；CLI-only 可 harness-check 标注 N/A）
  review:
    - tool: gstack
      skill: review
      when: PR 合并前 diff 结构审查，摘要写入 REVIEW.md
  integration:
    - tool: openspec
      command: taiyi archive <slug>
      optional: true
      when: 九阶段完成后归档规格（需 OpenSpec）
    - tool: gstack
      skill: document-release
      when: 合并后同步 README/CHANGELOG
