# workflow-manifest.yaml — harness / 工作流摘要真源
# 去重选型：docs/taiyi/library-selection.md（Superpowers 纪律 + ECC 深度 + 少量 CLI）
# ECC harness 未标 optional:true → 双线 harness 硬约束

superpowers_catalog:
  using-superpowers:
    when: 任意阶段入口；确认如何加载 Skill（目录参考）
  brainstorming:
    when: change 立项前澄清范围、风险、成功标准
  using-git-worktrees:
    when: 大功能隔离开发；recommended  worktree
  receiving-code-review:
    when: 收到 CR 反馈后严谨处理

auxiliary_skills:
  - id: taiyi-intel-scan
    phases: [change]
    artifact: CONTEXT.md
  - id: taiyi-architect
    phases: [design]
    artifact: adr/
  - id: taiyi-restyle
    phases: [ui-design]
    artifact: ui-restyle-tasks.md
  - id: taiyi-evolve
    phases: [test]
    artifact: architecture-sync.md
  # required_when 解析入库，但引擎尚未求值 complexity
  - id: taiyi-health
    phases: [review]
    artifact: health-report.md
    required_when: "complexity medium|high"
  # 有 when 字段 → 不进 auxiliaryForPhase 默认列表
  - id: taiyi-compress
    phases: [change, requirement, design, task, dev, test, review, integration]
    artifact: CONTEXT-COMPACT.md
    when: token 超 compressThreshold
  - id: taiyi-diagram-pipeline
    phases: [design]
    artifact: diagrams/c4/containers.md
    when: /taiyi:diagram-pipeline 三步流水线（c4 → arch → render）
  - id: taiyi-diagram-c4
    phases: [design]
    artifact: diagrams/c4/containers.md
    when: C4 真源 / 代码反推（流水线第 1 步）
  - id: taiyi-diagram-arch
    phases: [design]
    artifact: diagrams/architecture.md
    when: 同步工程图（流水线第 2 步）/ 产品海报
  - id: taiyi-diagram-render
    phases: [design]
    artifact: diagrams/c4/png/context.svg
    when: Mermaid → SVG（流水线第 3 步）
  - id: taiyi-diagram-flow
    phases: [design, task]
    artifact: diagrams/flows.md
    when: 多分支 AC、状态机、九阶段/harness 可视化

phases:
  change:
    taiyi_skill: taiyi-change
    artifact: CHANGE.md
    superpowers: [brainstorming]
    superpowers_optional: [using-git-worktrees]
    external_optional: [ecc/continuous-learning, ecc/market-research]
    capabilities:
      required: []
      optional: []
    slash: ["/taiyi:explore", "/taiyi:continue"]
    human_gate: true
    harness:
      - tool: superpowers
        skill: brainstorming
        when: 立项前澄清范围与风险（/taiyi:explore）
      - tool: ecc
        skill: continuous-learning
        when: 【硬约束】从历史变更提炼本能 / 模式（Continuous Learning）
  requirement:
    taiyi_skill: taiyi-requirement
    artifact: REQUIREMENT.md
    superpowers: []
    superpowers_optional: []
    external_optional: [openspec, ecc/iterative-retrieval]
    capabilities:
      required: []
      optional: [spec_sync]
    slash: ["/taiyi:continue"]
    human_gate: false
    harness:
      - tool: superpowers
        skill: writing-plans
        optional: true
        when: 完整流程建议先写 bite-sized 计划再落 REQUIREMENT
      - tool: ecc
        skill: iterative-retrieval
        when: 【硬约束】迭代检索知识库 / 文档支撑 REQUIREMENT
      - tool: openspec
        command: openspec change show <slug>
        optional: true
        when: 项目已 init OpenSpec 时对照 proposal/specs
  design:
    taiyi_skill: taiyi-design
    artifact: DESIGN.md
    superpowers: []
    superpowers_optional: []
    external_optional: [ecc/architecture-audit, ecc/backend-patterns, ecc/coding-standards, ecc/planner]
    capabilities:
      required: []
      optional: []
    slash: ["/taiyi:continue"]
    human_gate: true
    harness:
      - tool: ecc
        skill: architecture-audit
        when: 【硬约束】多维架构分析 + adr/（ECC 架构审查）
      - tool: ecc
        skill: backend-patterns
        when: 【硬约束】后端栈级 patterns
      - tool: ecc
        skill: coding-standards
        when: 【硬约束】编码规范对齐 DESIGN
  ui-design:
    taiyi_skill: taiyi-ui-design
    artifact: UI-DESIGN.md
    superpowers: []
    superpowers_optional: []
    external_optional: [ecc/web-design-guidelines, ecc/accessibility-audit, ecc/frontend-patterns]
    capabilities:
      required: []
      optional: []
    slash: ["/taiyi:continue"]
    human_gate: false
    harness:
      - tool: ecc
        skill: web-design-guidelines
        when: 【硬约束】Web 设计规范（替代 web-quality / design-review）
      - tool: ecc
        skill: accessibility-audit
        when: 【硬约束】WCAG 无障碍审计（纯 API 可 N/A+打卡）
      - tool: ecc
        skill: frontend-patterns
        when: 【硬约束】前端栈 patterns
  task:
    taiyi_skill: taiyi-task
    artifact: TASK.md
    superpowers: []
    superpowers_optional: [using-git-worktrees]
    external_optional: [ecc/planner, ecc/tdd-workflow, ecc/autonomous-loops]
    capabilities:
      required: []
      optional: []
    slash: ["/taiyi:tdd plan", "/taiyi:continue"]
    human_gate: false
    harness:
      - tool: ecc
        skill: planner
        when: 【硬约束】可执行计划 + 切片（取代 Superpowers writing-plans）
      - tool: ecc
        skill: tdd-workflow
        when: 【硬约束】TDD 测试计划（取代 Superpowers test-driven-development）
      - tool: taiyi
        skill: taiyi-ultrawork
        optional: true
        when: TASK.md 多切片并行或 /taiyi:ultrawork
  dev:
    taiyi_skill: taiyi-dev
    artifact: dev.bundle
    superpowers: []
    superpowers_optional: [using-git-worktrees]
    external_optional: [ecc/tdd-workflow, ecc/agent-introspection-debugging, ecc/autonomous-loops, ecc/backend-patterns, ecc/coding-standards]
    capabilities:
      required: []
      optional: []
    slash: ["/taiyi:tdd dev", "/taiyi:apply", "/taiyi:continue"]
    human_gate: false
    engine_gate: ".dev-complete 须 command + exitCode 0"
    harness:
      - tool: ecc
        skill: tdd-workflow
        when: 【硬约束】TDD 红绿重构（取代 Superpowers test-driven-development）
      - tool: superpowers
        skill: using-git-worktrees
        optional: true
        when: 隔离 worktree 开发
      - tool: ecc
        skill: agent-introspection-debugging
        optional: true
        when: 测试失败时科学调试（取代 Superpowers systematic-debugging）
      - tool: ecc
        skill: autonomous-loops
        optional: true
        when: 按计划分批执行（取代 Superpowers executing-plans）
      - tool: taiyi
        skill: taiyi-ultrawork
        optional: true
        when: 多切片并行 dev 或 /taiyi:ultrawork
      - tool: ecc
        skill: coding-standards
        when: 【硬约束】实现期编码规范
      - tool: ecc
        skill: backend-patterns
        when: 【硬约束】后端 patterns 落地
  test:
    taiyi_skill: taiyi-test
    artifact: TEST.md
    superpowers: []
    superpowers_optional: []
    external_optional: [playwright, ecc/test-coverage-analysis, ecc/eval-harness, ecc/verification-loop]
    capabilities:
      required: []
      optional: [e2e_test]
    slash: ["/taiyi:apply", "/taiyi:continue"]
    human_gate: false
    harness:
      - tool: ecc
        skill: verification-loop
        when: 【硬约束】声明完成前要有运行证据（取代 Superpowers verification-before-completion）
      - tool: ecc
        skill: test-coverage-analysis
        when: 【硬约束】覆盖率深度分析
      - tool: ecc
        skill: eval-harness
        when: 【硬约束】Eval / AI 评估 harness
  review:
    taiyi_skill: taiyi-review
    artifact: REVIEW.md
    superpowers: []
    superpowers_optional: [receiving-code-review]
    external_optional: [ecc/security-scan, ecc/code-review]
    capabilities:
      required: []
      optional: []
    slash: ["/taiyi:review-loop", "/taiyi:health", "/taiyi:commit", "/taiyi:ship", "/taiyi:continue"]
    human_gate: true
    harness:
      - tool: ecc
        skill: code-review
        when: 【硬约束】派审 / 合并前验证（取代 Superpowers requesting-code-review）
      - tool: superpowers
        skill: receiving-code-review
        optional: true
        when: 处理 CR 反馈
      - tool: ecc
        skill: security-scan
        when: 【硬约束】AgentShield（替代 semgrep/trivy 主路径）
  integration:
    taiyi_skill: taiyi-integration
    artifact: CHANGELOG.md
    superpowers: []
    superpowers_optional: []
    external_optional: [openspec/archive, changesets, ecc/strategic-compact, ecc/continuous-learning-v2, ecc/changelog-generator, ecc/delivery-gate, ecc/verification-loop]
    capabilities:
      required: [spec_archive]
      optional: [version_release]
    slash: ["/taiyi:audit", "/taiyi:land", "/taiyi:release", "/taiyi:continue", "/taiyi:archive"]
    human_gate: false
    engine_gate: delivery-gate + audit + AC 勾选
    harness:
      - tool: ecc
        skill: delivery-gate
        when: 【硬约束】验证测试 · 合并/PR/清理（取代 Superpowers finishing-a-development-branch）
      - tool: ecc
        skill: verification-loop
        when: 【硬约束】再次确认证据先于「已交付」（取代 Superpowers verification-before-completion）
      - tool: ecc
        skill: changelog-generator
        when: 【硬约束】从 commits 生成 CHANGELOG 草稿
      - tool: ecc
        skill: strategic-compact
        when: 【硬约束】战略级会话 / 上下文压缩
      - tool: ecc
        skill: continuous-learning-v2
        when: 【硬约束】Cross-change 本能更新（Continuous Learning v2）
      - tool: openspec
        command: taiyi archive <slug>
        optional: true
        when: OpenSpec 归档
