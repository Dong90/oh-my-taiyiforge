version: 1
name: taiyi-skills
description: 主流程 9 + 辅助 11，命名统一 taiyi-*（开源、Claude/Codex 共用）

main_process:
  - taiyi-change
  - taiyi-requirement
  - taiyi-design
  - taiyi-ui-design
  - taiyi-task
  - taiyi-dev
  - taiyi-test
  - taiyi-review
  - taiyi-integration

orchestrator:
  - id: taiyi-orchestrator
    when: init --auto 或 TAIYI_AUTO_HARNESS=1

auxiliary:
  - id: taiyi-intel-scan
    output: CONTEXT.md
  - id: taiyi-architect
    output: ADR
  - id: taiyi-health
    output: health-report
  - id: taiyi-evolve
    output: architecture-sync
  - id: taiyi-restyle
    output: ui-restyle-tasks
  - id: taiyi-compress
    output: CONTEXT-COMPACT.md
    when: Token 超阈值或 /taiyi:token compress / taiyi-compress Skill
  - id: taiyi-diagram-pipeline
    output: diagrams/c4/ + diagrams/architecture.md + diagrams/c4/png/*.svg
    when: /taiyi:diagram-pipeline 三步流水线总编排
  - id: taiyi-diagram-c4
    output: diagrams/c4/containers.md
    when: 流水线第 1 步 · C4 真源 / 代码反推
  - id: taiyi-diagram-arch
    output: diagrams/architecture.md
    when: 流水线第 2 步 · 同步工程图 / 产品海报
  - id: taiyi-diagram-render
    output: diagrams/c4/png/*.svg
    when: 流水线第 3 步 · Mermaid → SVG
  - id: taiyi-diagram-flow
    output: diagrams/flows.md
    when: 业务流程 / 九阶段 / 状态机流程图
