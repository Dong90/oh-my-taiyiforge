<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 280" font-family="-apple-system, 'PingFang SC', sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a0e1a"/>
      <stop offset="1" stop-color="#131830"/>
    </linearGradient>
    <linearGradient id="human" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#8a2be2"/>
      <stop offset="1" stop-color="#48d1cc"/>
    </linearGradient>
    <linearGradient id="auto" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#3a4570"/>
      <stop offset="1" stop-color="#4a5570"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="3"/></filter>
  </defs>

  <rect width="1200" height="280" fill="url(#bg)"/>

  <text x="40" y="40" fill="#e6e9f5" font-size="20" font-weight="700">Nine-stage workflow</text>
  <text x="40" y="62" fill="#8a92b0" font-size="13">紫色 = 人工门（须 --approver）  灰色 = 引擎自动推进</text>

  <g transform="translate(40,110)">
    <!-- 9 stages -->
    <g>
      <!-- change (human) -->
      <rect x="0" y="0" width="100" height="56" rx="10" fill="url(#human)" opacity="0.95"/>
      <text x="50" y="26" fill="#fff" font-size="13" text-anchor="middle" font-weight="600">change</text>
      <text x="50" y="44" fill="#e6d7ff" font-size="10" text-anchor="middle">🚧 人工门</text>

      <line x1="105" y1="28" x2="125" y2="28" stroke="#6b7390" stroke-width="2"/>

      <!-- requirement (auto) -->
      <rect x="130" y="0" width="100" height="56" rx="10" fill="url(#auto)"/>
      <text x="180" y="26" fill="#c8d0eb" font-size="13" text-anchor="middle" font-weight="600">requirement</text>
      <text x="180" y="44" fill="#8a92b0" font-size="10" text-anchor="middle">⚙ 自动</text>

      <line x1="235" y1="28" x2="255" y2="28" stroke="#6b7390" stroke-width="2"/>

      <!-- design (human) -->
      <rect x="260" y="0" width="100" height="56" rx="10" fill="url(#human)" opacity="0.95"/>
      <text x="310" y="26" fill="#fff" font-size="13" text-anchor="middle" font-weight="600">design</text>
      <text x="310" y="44" fill="#e6d7ff" font-size="10" text-anchor="middle">🚧 人工门</text>

      <line x1="365" y1="28" x2="385" y2="28" stroke="#6b7390" stroke-width="2"/>

      <!-- ui-design (auto) -->
      <rect x="390" y="0" width="100" height="56" rx="10" fill="url(#auto)"/>
      <text x="440" y="26" fill="#c8d0eb" font-size="13" text-anchor="middle" font-weight="600">ui-design</text>
      <text x="440" y="44" fill="#8a92b0" font-size="10" text-anchor="middle">⚙ 自动</text>

      <line x1="495" y1="28" x2="515" y2="28" stroke="#6b7390" stroke-width="2"/>

      <!-- task (auto) -->
      <rect x="520" y="0" width="100" height="56" rx="10" fill="url(#auto)"/>
      <text x="570" y="26" fill="#c8d0eb" font-size="13" text-anchor="middle" font-weight="600">task</text>
      <text x="570" y="44" fill="#8a92b0" font-size="10" text-anchor="middle">⚙ 自动</text>

      <line x1="625" y1="28" x2="645" y2="28" stroke="#6b7390" stroke-width="2"/>
    </g>

    <!-- second row -->
    <g transform="translate(130,80)">
      <!-- dev (auto) -->
      <rect x="0" y="0" width="100" height="56" rx="10" fill="url(#auto)"/>
      <text x="50" y="26" fill="#c8d0eb" font-size="13" text-anchor="middle" font-weight="600">dev</text>
      <text x="50" y="44" fill="#8a92b0" font-size="10" text-anchor="middle">⚙ TDD 强制</text>

      <line x1="105" y1="28" x2="125" y2="28" stroke="#6b7390" stroke-width="2"/>

      <!-- test (auto) -->
      <rect x="130" y="0" width="100" height="56" rx="10" fill="url(#auto)"/>
      <text x="180" y="26" fill="#c8d0eb" font-size="13" text-anchor="middle" font-weight="600">test</text>
      <text x="180" y="44" fill="#8a92b0" font-size="10" text-anchor="middle">⚙ 自动</text>

      <line x1="235" y1="28" x2="255" y2="28" stroke="#6b7390" stroke-width="2"/>

      <!-- review (human) -->
      <rect x="260" y="0" width="100" height="56" rx="10" fill="url(#human)" opacity="0.95"/>
      <text x="310" y="26" fill="#fff" font-size="13" text-anchor="middle" font-weight="600">review</text>
      <text x="310" y="44" fill="#e6d7ff" font-size="10" text-anchor="middle">🚧 人工门</text>

      <line x1="365" y1="28" x2="385" y2="28" stroke="#6b7390" stroke-width="2"/>

      <!-- integration (auto) -->
      <rect x="390" y="0" width="100" height="56" rx="10" fill="url(#auto)"/>
      <text x="440" y="26" fill="#c8d0eb" font-size="13" text-anchor="middle" font-weight="600">integration</text>
      <text x="440" y="44" fill="#8a92b0" font-size="10" text-anchor="middle">⚙ 自动</text>

      <line x1="495" y1="28" x2="515" y2="28" stroke="#6b7390" stroke-width="2"/>

      <!-- archive (auto) -->
      <rect x="520" y="0" width="100" height="56" rx="10" fill="url(#auto)"/>
      <text x="570" y="26" fill="#c8d0eb" font-size="13" text-anchor="middle" font-weight="600">archive</text>
      <text x="570" y="44" fill="#8a92b0" font-size="10" text-anchor="middle">🏁 收尾</text>
    </g>

    <!-- animated cursor -->
    <g>
      <circle cx="50" cy="28" r="6" fill="#48d1cc" filter="url(#glow)">
        <animate attributeName="cx" values="50;180;180;310;310;440;440;570;570;180;180;50;50" dur="9s" repeatCount="indefinite"/>
        <animate attributeName="cy" values="28;28;28;28;28;28;28;28;28;108;108;108;28" dur="9s" repeatCount="indefinite"/>
      </circle>
    </g>
  </g>

  <text x="40" y="250" fill="#6b7390" font-size="12" font-family="monospace">
    $ npx taiyi new "功能名"   # change → ... → archive （引擎不放行跳关）
  </text>
</svg>
