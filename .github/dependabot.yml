version: 2
updates:
  # npm 依赖：每周一扫，target develop（不是 main）
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Asia/Shanghai
    target-branch: develop
    open-pull-requests-limit: 10
    # reviewers 字段已被 GitHub deprecated，改用 CODEOWNERS 自动分派
    labels:
      - dependencies
      - npm
    commit-message:
      prefix: chore
      include: scope
    groups:
      # devDependencies 一起升，省 PR 数量
      dev-dependencies:
        dependency-type: development
        ignore:
          - dependency-name: "@types/node"
            update-types: ["version-update:semver-major"]
          - dependency-name: "typescript"
            update-types: ["version-update:semver-major"]
          - dependency-name: "vitest"
            update-types: ["version-update:semver-major"]
          - dependency-name: "@vitest/coverage-v8"
            update-types: ["version-update:semver-major"]
          - dependency-name: "@vitest/*"
            update-types: ["version-update:semver-major"]
      # production 依赖也归组（这个项目只有 2 个）
      prod-dependencies:
        dependency-type: production
    # 不拦截 major：安全补丁优先；open-pull-requests-limit 控制并发数
    # Dependabot security alerts 独立于 version updates，不受影响

  # GitHub Actions 依赖：每周一扫
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Asia/Shanghai
    target-branch: develop
    open-pull-requests-limit: 5
    # reviewers 字段已被 GitHub deprecated，改用 CODEOWNERS 自动分派
    labels:
      - dependencies
      - github-actions
    commit-message:
      prefix: ci
