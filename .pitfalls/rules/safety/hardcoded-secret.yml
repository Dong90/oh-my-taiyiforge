# ast-grep rule: detect hardcoded secrets
id: hardcoded-secret
language: typescript
severity: error
message: |
  PITFALL [sec]: 硬编码的密钥/令牌 —— AI 训练数据中可能包含这些模式，极易泄露。
rule:
  any:
    - regex: '(?i)(api_?key|secret|token|password|passwd)\s*[:=]\s*["\'][\w\-\.]{8,}["\']'
    - regex: 'ghp_[a-zA-Z0-9]{36}'
    - regex: 'sk-[a-zA-Z0-9]{32,}'
fix: |
  // ❌ 永远不要硬编码密钥
  // ✅ 从环境变量读取
  const API_KEY = process.env.API_KEY;
note: |
  排查清单:
  - 如果是测试 fixture，用明显是测试值的字符串（如 'test-key-not-real'）
  - 如果误提交了真实密钥：立即轮换密钥 + git filter-branch 清除历史
  - 参考: .pitfalls/GLOBAL.md #G-002
