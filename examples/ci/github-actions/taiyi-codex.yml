# Codex CLI — PR 校验 + 可选 codex exec 推进
name: TaiyiForge Codex

on:
  workflow_dispatch:
    inputs:
      slug:
        required: true
        description: Taiyi change slug
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm ci && npm install oh-my-taiyiforge --no-save
      - run: npx taiyi ci platform codex
      - run: npx taiyi ci verify

  advance:
    if: github.event_name == 'workflow_dispatch'
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm ci && npm install oh-my-taiyiforge --no-save
      - run: npx taiyi ci prompt "${{ inputs.slug }}"
      - name: Codex advance (optional)
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          PROMPT=$(ls .taiyi/ci-prompts/${{ inputs.slug }}-*.txt 2>/dev/null | head -1)
          if command -v codex >/dev/null 2>&1 && [ -n "$OPENAI_API_KEY" ] && [ -n "$PROMPT" ]; then
            codex exec "$(cat "$PROMPT")"
          else
            echo "跳过：需要 codex CLI + OPENAI_API_KEY"
          fi
