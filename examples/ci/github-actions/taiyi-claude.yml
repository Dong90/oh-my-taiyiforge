# Claude Code — PR 校验 + 可选 claude -p 推进
name: TaiyiForge Claude

on:
  workflow_dispatch:
    inputs:
      slug:
        required: true
        description: Taiyi change slug
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm ci && npm install oh-my-taiyiforge --no-save
      - run: npx taiyi ci platform claude
      - run: npx taiyi ci verify

  advance:
    if: github.event_name == 'workflow_dispatch'
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm ci && npm install oh-my-taiyiforge --no-save
      - run: npx taiyi ci prompt "${{ inputs.slug }}"
      - name: Claude advance (optional)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          PROMPT=$(ls .taiyi/ci-prompts/${{ inputs.slug }}-*.txt 2>/dev/null | head -1)
          if command -v claude >/dev/null 2>&1 && [ -n "$ANTHROPIC_API_KEY" ] && [ -n "$PROMPT" ]; then
            claude -p "$(cat "$PROMPT")"
          else
            echo "跳过：需要 claude CLI + ANTHROPIC_API_KEY"
          fi
