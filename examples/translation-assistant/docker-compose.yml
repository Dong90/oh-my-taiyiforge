services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: translation-backend
    ports:
      - "8000:8000"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_API_BASE_URL=${OPENAI_API_BASE_URL:-https://s.lconai.com/v1}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - TAIYI_ENV=${TAIYI_ENV:-dev}
    volumes:
      - ./agent/backend/app:/app/app:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  frontend:
    image: nginx:alpine
    container_name: translation-frontend
    ports:
      - "8080:80"
    volumes:
      - ./agent/frontend:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
